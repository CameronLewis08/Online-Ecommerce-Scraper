version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ecommerce_etl
      POSTGRES_USER: ${POSTGRES_USER:-etluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etlpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etluser} -d ecommerce_etl"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env                          # loads everything else from .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-etluser}:${POSTGRES_PASSWORD:-etlpassword}@postgres:5432/ecommerce_etl
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
